<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edad</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap');

        :root {
            --font-family: 'Kalam', cursive, system-ui, sans-serif;
            --primary-color: #ff6464;
            --bg-color: #ffffff;
            --text-color: #213547;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            font-weight: 400;
        }

        /* Widget specific */
        body {
            background-color: transparent;
            margin: 0;
            padding: 0;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .age-container {
            position: relative;
            padding: 0.5rem 1rem;
            background-clip: padding-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background-color: rgba(255, 255, 255);
            border-radius: 999px;
            margin-top: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255);
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary-color, #646cff);
            width: 0%;
            border-radius: 999px;
        }

        .edad-text-wrapper {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            min-width: 280px;
        }

        #age-display {
            display: inline-flex;
            align-items: flex-end;
        }

        .digit-slot {
            display: inline-block;
            height: 1.5em;
            overflow: hidden;
            position: relative;
            width: 0.65em;
            vertical-align: bottom;
        }

        .digit-track {
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
        }

        .digit-track span {
            display: block;
            height: 1.5em;
            line-height: 1.5em;
            text-align: center;
        }

        .char-slot {
            display: inline-block;
            height: 1.5em;
            line-height: 1.5em;
            vertical-align: bottom;
        }

        .percentage {
            font-size: 0.9rem;
            color: #c1c1c1;
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>

<body>
    <div class="age-container">
        <div class="edad-text-wrapper">
            <span class="edad" id="age-display"></span><span class="edad">&nbsp;años</span>
        </div>
        <div class="percentage" id="percentage-display"></div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <script>
        const birthDate = new Date('2007-01-12T00:00:00');

        function updateAgeDisplay(formattedAge) {
            const container = document.getElementById('age-display');
            
            // Check if container structure matches string length
            if (container.children.length !== formattedAge.length) {
                container.innerHTML = '';
                for (let i = 0; i < formattedAge.length; i++) {
                    const char = formattedAge[i];
                    if (char >= '0' && char <= '9') {
                        const slot = document.createElement('span');
                        slot.className = 'digit-slot';
                        
                        const track = document.createElement('span');
                        track.className = 'digit-track';
                        track.dataset.currentDigit = '0';
                        
                        // Add digits 0-9 twice for smooth wrap-around
                        for (let cycle = 0; cycle < 2; cycle++) {
                            for (let d = 0; d <= 9; d++) {
                                const digitSpan = document.createElement('span');
                                digitSpan.textContent = d;
                                track.appendChild(digitSpan);
                            }
                        }
                        
                        slot.appendChild(track);
                        container.appendChild(slot);
                    } else {
                        const charSpan = document.createElement('span');
                        charSpan.className = 'char-slot';
                        charSpan.textContent = char;
                        container.appendChild(charSpan);
                    }
                }
            }
            
            // Update track positions with slide-up transitions
            for (let i = 0; i < formattedAge.length; i++) {
                const char = formattedAge[i];
                const slot = container.children[i];
                
                if (char >= '0' && char <= '9') {
                    const track = slot.querySelector('.digit-track');
                    const targetDigit = parseInt(char, 10);
                    const currentDigit = parseInt(track.dataset.currentDigit || '0', 10);
                    
                    if (currentDigit !== targetDigit) {
                        if (targetDigit < currentDigit) {
                            // Slide to target in second cycle
                            track.style.transition = 'transform 0.25s cubic-bezier(0.25, 1, 0.5, 1)';
                            track.style.transform = `translateY(-${((10 + targetDigit) * 100) / 20}%)`;
                            track.dataset.currentDigit = targetDigit.toString();
                            
                            // Snap back to index targetDigit in first cycle instantly after transition
                            setTimeout(() => {
                                track.style.transition = 'none';
                                track.style.transform = `translateY(-${(targetDigit * 100) / 20}%)`;
                            }, 250);
                        } else {
                            // Normal slide
                            track.style.transition = 'transform 0.25s cubic-bezier(0.25, 1, 0.5, 1)';
                            track.style.transform = `translateY(-${(targetDigit * 100) / 20}%)`;
                            track.dataset.currentDigit = targetDigit.toString();
                        }
                    }
                } else {
                    if (slot.textContent !== char) {
                        slot.textContent = char;
                    }
                }
            }
        }

        function updateAge() {
            const now = new Date();

            // Calculate base year difference
            let years = now.getFullYear() - birthDate.getFullYear();

            // Create date object for the birthday in the current year
            let lastBirthday = new Date(birthDate);
            lastBirthday.setFullYear(now.getFullYear());

            // Adjust if we haven't reached the birthday yet this year
            if (now < lastBirthday) {
                years--;
                lastBirthday.setFullYear(now.getFullYear() - 1);
            }

            // Determine next birthday to calculate the length of the current 'age year'
            let nextBirthday = new Date(lastBirthday);
            nextBirthday.setFullYear(lastBirthday.getFullYear() + 1);

            // Calculate fraction
            const yearDuration = nextBirthday - lastBirthday;
            const timeSinceLastBirthday = now - lastBirthday;

            const fraction = timeSinceLastBirthday / yearDuration;
            const exactAge = years + fraction;

            // Format to 7 decimal places with comma
            let formattedAge = exactAge.toFixed(7).replace('.', ',');

            // Update sliding age display
            updateAgeDisplay(formattedAge);

            // Update progress bar and percentage text
            const percentage = fraction * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';
            document.getElementById('percentage-display').innerText = percentage.toFixed(2).replace('.', ',') + '%';

            requestAnimationFrame(updateAge);
        }

        updateAge();
    </script>
</body>

</html>
